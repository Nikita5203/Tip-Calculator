<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Tip Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 320px;
            text-align: center;
        }

        h2 { color: #333; margin-bottom: 20px; }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
        }

        input:focus { border-color: #764ba2; }

        button {
            width: 100%;
            padding: 12px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #5a387e; }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f0f4ff;
            border-radius: 10px;
            display: none;
        }

        .result p { margin: 8px 0; font-size: 18px; color: #333; }
        .highlight { color: #764ba2; font-weight: bold; font-size: 22px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>💸 Tip Calculator</h2>
        
        <input type="number" id="bill" placeholder="Bill Amount ($)">
        <input type="number" id="tipPercent" placeholder="Tip Percentage (%)">
        
        <button onclick="calculateTip()">Calculate</button>

        <div class="result" id="resultBox">
            <p>Tip Amount: <span class="highlight" id="tipAmount">$0.00</span></p>
            <p>Total Bill: <span class="highlight" id="totalBill">$0.00</span></p>
        </div>
    </div>

    <script>
        function calculateTip() {
            let bill = parseFloat(document.getElementById('bill').value);
            let tipPercent = parseFloat(document.getElementById('tipPercent').value);

            if (isNaN(bill) || isNaN(tipPercent) || bill <= 0) {
                alert("Please enter a valid bill amount and tip percentage!");
                return;
            }

            let tipAmount = (bill * tipPercent) / 100;
            let total = bill + tipAmount;

            document.getElementById('tipAmount').innerText = "$" + tipAmount.toFixed(2);
            document.getElementById('totalBill').innerText = "$" + total.toFixed(2);
            
            document.getElementById('resultBox').style.display = "block";
        }
    </script>

</body>
</html>
